<app-header-app />

<div class="layout">
  <aside class="back-pane">
    <button type="button" class="back-btn" (click)="back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      <span>ย้อนกลับ</span>
    </button>
  </aside>

  <main class="content">
    <form class="form" (ngSubmit)="save(f)" #f="ngForm">
      <label class="field">
        <span class="label">ชื่อระบบ (SystemName)</span>
        <input name="systemName" placeholder="เช่น Facebook" ngModel required />
      </label>
      <label class="field">
        <span class="label">ชื่อ Secret (SecretName)</span>
        <input name="secretName" placeholder="เช่น Facebook Main" ngModel />
      </label>
      <label class="field">
        <span class="label">คำอธิบาย (SecretDescription)</span>
        <input name="secretDescription" placeholder="หมายเหตุ..." ngModel />
      </label>
      <label class="field">
        <span class="label">รูป/โลโก้ (Picture)</span>
        <input type="file" accept="image/*" (change)="onPictureSelected($event)" />
        @if (picture()) {
          <img class="preview" [src]="picture()" alt="preview" />
        }
      </label>

      <label class="field">
        <span class="label">Username</span>
        <input name="username" placeholder="Enter username" ngModel />
      </label>
      <label class="field">
        <span class="label">PIN / Email / Phone</span>
        <input name="pin" placeholder="Enter PIN/Email/Phone" ngModel />
      </label>
      <label class="field">
        <span class="label">Password</span>
        <input name="password" type="password" placeholder="Enter Password" ngModel />
      </label>
      <label class="field">
        <span class="label">ข้อมูลสำคัญอื่นๆ</span>
        <input name="other" placeholder="Enter ..." ngModel />
      </label>

      <label class="field">
        <span class="label">หมวดหมู่</span>
        <select name="category" ngModel required>
          <option value="" disabled selected>เลือกหมวดหมู่</option>
          @for (c of categories; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </label>

      @if (error()) {
        <p class="form-error">{{ error() }}</p>
      }
      <div class="actions">
        <button type="submit" class="btn-save" [disabled]="loading()">
          {{ loading() ? 'กำลังบันทึก...' : 'SAVE' }}
        </button>
      </div>
    </form>
  </main>
</div>
