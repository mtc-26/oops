<app-header-app />

<div class="layout">
  <app-sidebar [activeCategory]="category()" />

  <main class="content">
    @if (loading()) {
      <p class="loading">กำลังโหลด...</p>
    } @else if (error()) {
      <p class="empty">{{ error() }}</p>
    } @else {
      <div class="grid">
        <button type="button" class="add-card" (click)="add()" aria-label="เพิ่มแอปใหม่">
          <span class="plus">+</span>
          <span class="add-label">เพิ่มแอป</span>
        </button>

        @for (entry of entries(); track entry.usersecretId) {
          <button type="button" class="app-card saved" (click)="open(entry)">
            @if (entry.picture) {
              <img class="logo-img" [src]="entry.picture" [alt]="entry.systemName" />
            } @else {
              <span class="logo">{{ entry.systemName.charAt(0).toUpperCase() }}</span>
            }
            <span class="name">{{ entry.systemName }}</span>
          </button>
        }

        @if (entries().length === 0) {
          <p class="empty">ยังไม่มีรายการ — กด + เพื่อเพิ่ม</p>
        }
      </div>
    }
  </main>
</div>
