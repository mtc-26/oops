<app-header-app />

<div class="layout">
  <app-sidebar [activeCategory]="category() === 'all' ? null : category()" />

  <main class="content">
    @if (loading()) {
      <p class="loading">กำลังโหลด...</p>
    } @else if (error()) {
      <p class="empty">{{ error() }}</p>
    } @else {
      <div class="grid">
        <a routerLink="/safebox/add" class="add-card" aria-label="Add new entry">
          <span class="plus">+</span>
          <span class="add-label">เพิ่มรายการ</span>
        </a>

        @for (entry of entries(); track entry.id) {
          <button type="button" class="app-card" (click)="open(entry.id)">
            <span class="logo" [style.background]="entry.color">
              {{ entry.systemName.charAt(0).toUpperCase() }}
            </span>
            <span class="name">{{ entry.systemName }}</span>
          </button>
        }

        @if (entries().length === 0) {
          <p class="empty">ยังไม่มีรายการในหมวด "{{ categoryLabel() }}" — กด + เพื่อเพิ่ม</p>
        }
      </div>
    }
  </main>
</div>
