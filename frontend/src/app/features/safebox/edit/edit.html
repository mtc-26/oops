<app-header-app />

<div class="layout">
  <aside class="back-pane">
    <button type="button" class="back-btn" (click)="back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      <span>ย้อนกลับ</span>
    </button>
  </aside>

  <main class="content">
    @if (loading()) {
      <p class="loading">กำลังโหลด...</p>
    } @else if (entry()) {
      <form class="form" (ngSubmit)="save()">
        <label class="field">
          <span class="label">ชื่อระบบ</span>
          <input [ngModel]="systemName()" (ngModelChange)="systemName.set($event)" name="systemName" required />
        </label>
        <label class="field">
          <span class="label">Username</span>
          <input [ngModel]="username()" (ngModelChange)="username.set($event)" name="username" placeholder="Enter username" />
        </label>
        <label class="field">
          <span class="label">PIN / Email / Phone</span>
          <input [ngModel]="pin()" (ngModelChange)="pin.set($event)" name="pin" placeholder="Enter PIN/email/phone" />
        </label>
        <label class="field">
          <span class="label">Password</span>
          <input [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" type="password" placeholder="Enter password" />
        </label>
        <label class="field">
          <span class="label">ข้อมูลสำคัญอื่นๆ</span>
          <input [ngModel]="other()" (ngModelChange)="other.set($event)" name="other" placeholder="ระบุ..." />
        </label>

        @if (error()) {
          <p class="form-error">{{ error() }}</p>
        }

        <div class="actions">
          <button type="button" class="btn-delete" (click)="remove()" [disabled]="saving()">ลบ</button>
          <button type="submit" class="btn-save" [disabled]="saving()">
            {{ saving() ? 'กำลังบันทึก...' : 'SAVE' }}
          </button>
        </div>
      </form>
    } @else {
      <p class="loading">{{ error() ?? 'ไม่พบรายการ' }}</p>
    }
  </main>
</div>
