<main class="page">
  <div class="card">
    <h1 class="logo">OOPS!</h1>
    <p class="prompt">กรุณากรอก Email - OTP เพื่อยืนยันตัวตน</p>
    @if (email()) {
      <p class="meta">{{ email() }}</p>
    }
    <input
      class="otp-input"
      placeholder="Email-OTP"
      [ngModel]="otp()"
      (ngModelChange)="otp.set($event)"
      (keyup.enter)="submit()"
    />
    @if (error()) {
      <p class="form-error">{{ error() }}</p>
    }
    <button type="button" class="btn-submit" (click)="submit()" [disabled]="loading()">
      {{ loading() ? 'กำลังตรวจ...' : 'SUBMIT' }}
    </button>
  </div>
</main>
