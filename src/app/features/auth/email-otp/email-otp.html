<main class="page">
  <div class="card">
    <h1 class="logo">OOPS!</h1>
    <p class="prompt">กรุณากรอก Email - OTP เพื่อยืนยันตัวตน</p>
    <input
      class="otp-input"
      placeholder="Email-OTP"
      [ngModel]="otp()"
      (ngModelChange)="otp.set($event)"
    />
    <button type="button" class="btn-submit" (click)="submit()">SUBMIT</button>
  </div>
</main>
