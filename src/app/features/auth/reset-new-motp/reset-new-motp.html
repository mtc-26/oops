<main class="page">
  <div class="card">
    <h2 class="heading">Reset M-OTP</h2>
    <h1 class="logo">OOPS!</h1>
    <p class="prompt">กรุณากรอกรหัส M-OTP ใหม่</p>
    <input
      class="input"
      placeholder="Enter M-OTP"
      [ngModel]="motp()"
      (ngModelChange)="motp.set($event)"
    />
    <button class="btn-submit" (click)="submit()">submit</button>
  </div>
</main>
